{% extends "base.html" %}

{% block head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Maps API with error handling -->
<script>
    window.gm_authFailure = function() {
        console.error('Google Maps authentication failed');
        alert('Google Maps failed to load. Please check the console for details.');
    };
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxUWrKL0CNlvxSd8Dzk3e-f2-YVFZ-0y4&libraries=places" async defer></script>

<style>
    .pac-container {
        z-index: 1051 !important;
    }
    #location-search {
        width: 100%;
        padding: 8px;
        font-size: 16px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <!-- Location Selector -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="location-form" class="d-flex align-items-center">
                        <div class="flex-grow-1 me-3">
                            <input 
                                id="location-search" 
                                type="text"
                                class="form-control" 
                                placeholder="Enter a location..."
                                autocomplete="off"
                            >
                            <input type="hidden" id="lat" name="lat">
                            <input type="hidden" id="lng" name="lng">
                            <input type="hidden" id="location-name" name="location-name">
                        </div>
                        <div class="d-flex align-items-center">
                            <label for="radius" class="me-2">Radius (miles):</label>
                            <input type="number" id="radius" name="radius" 
                                   class="form-control me-3" style="width: 80px;" 
                                   value="30" min="1" max="50">
                            <button type="submit" class="btn btn-primary">Update Location</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Analysis Section -->
    <div class="row mb-4">
        <div class="col-12">
            <h2>AI Analysis and Insights</h2>
            <div id="analysis" class="card">
                <div class="card-body">
                    Loading analysis...
                </div>
            </div>
        </div>
    </div>

    <!-- Interactive Map Section -->
    <div class="row mb-4">
        <div class="col-12">
            <h2>Bird Observation Map</h2>
            <div class="card">
                <div class="card-body">
                    <div id="map" style="height: 500px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Observations Section -->
    <div class="row">
        <div class="col-12">
            <h2>Recent Bird Observations</h2>
            <div id="observations-list" class="mt-3">
                Loading observations...
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, initializing Places...');
    
    // Initialize Google Places Autocomplete
    const searchInput = document.getElementById('location-search');
    console.log('Search input found:', searchInput);
    
    const autocomplete = new google.maps.places.Autocomplete(searchInput, {
        types: ['(cities)'],
        componentRestrictions: { country: 'us' }
    });
    console.log('Autocomplete initialized');

    // Handle place selection
    autocomplete.addListener('place_changed', function() {
        console.log('Place changed');
        const place = autocomplete.getPlace();
        if (place.geometry) {
            console.log('Selected place:', place.name);
            document.getElementById('lat').value = place.geometry.location.lat();
            document.getElementById('lng').value = place.geometry.location.lng();
            document.getElementById('location-name').value = place.name;
        }
    });

    // Handle form submission
    document.getElementById('location-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const lat = document.getElementById('lat').value;
        const lng = document.getElementById('lng').value;
        const name = document.getElementById('location-name').value;
        const radius = document.getElementById('radius').value;

        if (!lat || !lng || !name) {
            alert('Please select a location from the suggestions');
            return;
        }

        const formData = new FormData();
        formData.append('lat', lat);
        formData.append('lng', lng);
        formData.append('name', name);
        formData.append('radius', radius);

        fetch('/api/location', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                window.location.reload();
            } else {
                alert('Error updating location: ' + data.error);
            }
        });
    });

    // Initialize map
    const map = L.map('map').setView([39.1031, -84.5120], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Create layer groups for different bird types
    const layers = {
        raptors: L.layerGroup(),
        waterfowl: L.layerGroup(),
        songbirds: L.layerGroup(),
        other: L.layerGroup()
    };

    // Add layer groups to map
    Object.values(layers).forEach(layer => layer.addTo(map));

    // Load observations
    fetch('/api/observations')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('observations-list');
            list.innerHTML = '';
            
            data.forEach(obs => {
                // Add to list
                list.innerHTML += `
                    <div class="card mb-2">
                        <div class="card-body">
                            <h5 class="card-title">${obs.comName}</h5>
                            <p class="card-text">
                                Location: ${obs.locName}<br>
                                Date: ${obs.obsDt}<br>
                                Count: ${obs.howMany || 1}
                            </p>
                        </div>
                    </div>
                `;

                // Add to map if coordinates exist
                if (obs.lat && obs.lng) {
                    // Determine bird type and color
                    let layer = layers.other;
                    let color = 'gray';
                    
                    if (/hawk|eagle|owl|falcon|kite|osprey/i.test(obs.comName)) {
                        layer = layers.raptors;
                        color = 'red';
                    } else if (/duck|goose|swan|merganser|teal/i.test(obs.comName)) {
                        layer = layers.waterfowl;
                        color = 'blue';
                    } else if (/warbler|sparrow|finch|thrush/i.test(obs.comName)) {
                        layer = layers.songbirds;
                        color = 'green';
                    }

                    L.circleMarker([obs.lat, obs.lng], {
                        radius: 8,
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.7
                    })
                    .bindPopup(`
                        <b>${obs.comName}</b><br>
                        Count: ${obs.howMany || 1}<br>
                        Location: ${obs.locName}<br>
                        Date: ${obs.obsDt}
                    `)
                    .addTo(layer);
                }
            });

            // Add layer control
            L.control.layers(null, {
                'Raptors': layers.raptors,
                'Waterfowl': layers.waterfowl,
                'Songbirds': layers.songbirds,
                'Other Birds': layers.other
            }, {
                collapsed: false
            }).addTo(map);
        });

    // Load analysis
    fetch('/api/analysis')
        .then(response => response.json())
        .then(data => {
            // Replace newlines with <br> tags and preserve formatting
            const formattedAnalysis = data.analysis
                .split('\n')
                .map(line => {
                    // Add bullet point styling
                    if (line.trim().startsWith('-')) {
                        return `<span class="bullet-point">${line}</span>`;
                    }
                    // Add section title styling
                    else if (line.trim().match(/^\d+\./)) {
                        return `<h4 class="mt-4">${line}</h4>`;
                    }
                    return line;
                })
                .join('<br>');

            document.getElementById('analysis').innerHTML = 
                `<div class="card-body analysis-content">${formattedAnalysis}</div>`;
        });
});
</script>
{% endblock %}
