<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario's Bird Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Mario's Bird Tracker</h1>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <a href="/map" class="btn btn-primary btn-lg w-100 mb-2">Map</a>
            </div>
            <div class="col-md-6">
                <a href="/ai-analysis" class="btn btn-success btn-lg w-100 mb-2">AI Analysis</a>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <a href="/request-registration" class="btn btn-info btn-lg w-100 mb-2">Request Registration</a>
            </div>
            <div class="col-md-6">
                <a href="/login" class="btn btn-secondary btn-lg w-100 mb-2">Login</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Recent Bird Sightings</h5>
                <div id="sightings-container">
                    <!-- Sightings will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to load recent sightings
        function loadSightings() {
            fetch('/api/recent-sightings')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('sightings-container');
                    container.innerHTML = '';
                    
                    data.forEach(sighting => {
                        const sightingElement = document.createElement('div');
                        sightingElement.className = 'alert alert-info';
                        sightingElement.innerHTML = `
                            <strong>${sighting.bird_name}</strong> 
                            spotted at ${sighting.location} 
                            on ${new Date(sighting.timestamp).toLocaleString()}
                        `;
                        container.appendChild(sightingElement);
                    });
                })
                .catch(error => console.error('Error loading sightings:', error));
        }

        // Load sightings on page load and every 5 minutes
        loadSightings();
        setInterval(loadSightings, 300000);
    </script>
</body>
</html>
