{% extends "base.html" %}

{% block head %}
<style>
    .login-card {
        max-width: 400px;
        margin: 0 auto;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: none;
        border-radius: 10px;
    }
    .login-header {
        background-color: #343a40;
        color: white;
        border-radius: 10px 10px 0 0;
        padding: 20px;
    }
    .login-body {
        padding: 30px;
    }
    .form-control {
        border-radius: 5px;
        padding: 12px;
    }
    .btn-login {
        padding: 12px;
        font-weight: 500;
        border-radius: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card login-card">
                <div class="login-header">
                    <h3 class="text-center mb-0">Welcome Back</h3>
                </div>
                <div class="login-body">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-login w-100">Sign In</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-2">
                            <a href="{{ url_for('auth.request_registration') }}" class="text-decoration-none">New user? Request Registration</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
