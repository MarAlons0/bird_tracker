{% extends "base.html" %}

{% block title %}AI Analysis - Bird Tracker{% endblock %}

{% block head %}
<meta name="csrf-token" content="{{ csrf_token() }}">
<style>
    .analysis-section {
        background: var(--bg-secondary);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 2rem;
        width: 100%;
    }
    .observation-card {
        margin-bottom: 15px;
    }
    .chat-messages {
        min-height: 200px;
        max-height: 50vh;
        overflow-y: auto;
        padding: 15px;
    }
    .message {
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: 15px;
        max-width: 80%;
        word-wrap: break-word;
    }
    .user-message {
        background: #2a4a7f;
        color: var(--text-primary);
        margin-left: auto;
    }
    .bot-message {
        background: var(--bg-nav);
        border: 1px solid var(--border);
        color: var(--text-primary);
        margin-right: auto;
    }
    .analysis-content {
        min-height: 200px;
        background-color: var(--bg-secondary);
        overflow: visible;
        height: auto;
        white-space: normal;
        word-wrap: break-word;
        display: block;
        padding: 1rem;
        margin-bottom: 1rem;
        color: var(--text-primary);
    }
    .analysis-content:empty {
        border: 2px dashed var(--border) !important;
    }
    .current-location {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-bottom: 1rem;
    }
    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(26, 26, 46, 0.9);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .loading-spinner {
        width: 3rem;
        height: 3rem;
    }
    .chat-suggestion {
        background: var(--bg-nav);
        border: 1px solid var(--border);
        border-radius: 15px;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        color: var(--text-primary);
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .chat-suggestion:hover {
        background: var(--border);
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Recent Bird Sightings Analysis</h5>
                </div>
                <div class="card-body" id="analysisContent">
                    <div id="loading-spinner" class="text-center" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Generating analysis...</p>
                    </div>
                    <div class="alert alert-info">
                        Loading analysis...
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Chat with AI Assistant</h5>
                </div>
                <div class="card-body">
                    <div id="chatMessages" class="chat-messages mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control" placeholder="Ask a question...">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/analysis.js') }}"></script>
{% endblock %}
