{% extends "base.html" %}

{% block title %}Report - Bird Tracker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-chart-line"></i>
                    Bird Sighting Report
                </h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info" role="alert">
                    <h5 class="alert-heading">Report Feature</h5>
                    <p>This feature is currently under development. Check back soon for detailed bird sighting reports!</p>
                    <hr>
                    <p class="mb-0">
                        <a href="{{ url_for('main.home') }}" class="btn btn-primary">
                            <i class="fas fa-home"></i> Return to Home
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
