{% extends "base.html" %}

{% block title %}Error - Bird Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">
                    <i class="fas fa-exclamation-triangle"></i>
                    Error
                </h4>
            </div>
            <div class="card-body">
                <div class="alert alert-danger" role="alert">
                    <h5 class="alert-heading">Something went wrong!</h5>
                    <p>{{ error if error else "An unexpected error occurred." }}</p>
                    <hr>
                    <p class="mb-0">
                        <a href="{{ url_for('main.home') }}" class="btn btn-primary">
                            <i class="fas fa-home"></i> Return to Home
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
