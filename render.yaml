# Render Blueprint for Bird Tracker App
# Deploy for free: https://render.com/docs/infrastructure-as-code

databases:
  - name: bird-tracker-db
    plan: free
    databaseName: bird_tracker
    user: bird_tracker_user

services:
  - type: web
    name: bird-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bird-tracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      # The following should be set manually in the Render dashboard for security:
      # - SECRET_KEY (generate new: python -c "import secrets; print(secrets.token_hex(32))")
      # - EBIRD_API_KEY
      # - ANTHROPIC_API_KEY
      # - GOOGLE_PLACES_API_KEY
      # - SMTP_SERVER, SMTP_PORT, SMTP_USER, SMTP_PASSWORD
      # - CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
      # - ADMIN_EMAIL, ADMIN_PASSWORD
