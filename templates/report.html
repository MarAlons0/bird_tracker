{% extends "base.html" %}

{% block title %} - Bird Report{% endblock %}

{% block head %}
<style>
    .analysis-section {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 2rem;
        width: 100%;
    }
    .analysis-section .card {
        height: auto;
        min-height: 200px;
        max-height: none;
    }
    .analysis-section .card-body {
        height: auto;
        min-height: 200px;
        max-height: none;
        overflow: visible;
    }
    .observation-card {
        margin-bottom: 15px;
    }
    .chat-container {
        margin-top: 30px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        height: 400px;
        display: flex;
        flex-direction: column;
    }
    .chat-messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 15px;
    }
    .chat-input {
        border-top: 1px solid #dee2e6;
        padding: 15px;
    }
    .message {
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: 15px;
        max-width: 80%;
    }
    .user-message {
        background: #007bff;
        color: white;
        margin-left: auto;
    }
    .bot-message {
        background: #e9ecef;
        margin-right: auto;
    }
    .analysis-content {
        min-height: 200px;
        background-color: #f8f9fa;
        overflow: visible;
        max-height: none;
        height: auto;
        white-space: normal;
        word-wrap: break-word;
        display: block;
        padding: 1rem;
        margin-bottom: 1rem;
    }
    .analysis-content:empty {
        border: 2px dashed #dee2e6 !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Recent Bird Sightings Analysis</h5>
                </div>
                <div class="card-body" id="analysisContent">
                    <div class="alert alert-info">
                        Loading analysis...
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Chat with AI Assistant</h5>
                </div>
                <div class="card-body">
                    <div id="chatMessages" class="chat-messages mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control" placeholder="Ask a question...">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/report.js') }}"></script>
{% endblock %}
