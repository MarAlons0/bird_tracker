<!DOCTYPE html>
<html>
<head>
    <title>Bird Tracker Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .map-container {
            height: 400px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Bird Tracker</h1>
        
        <!-- Location Settings -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Location Settings</h5>
            </div>
            <div class="card-body">
                <form id="locationForm">
                    <div class="row">
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="locationName" placeholder="Location Name">
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.0001" class="form-control" id="latitude" placeholder="Latitude">
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.0001" class="form-control" id="longitude" placeholder="Longitude">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" id="radius" placeholder="Radius (km)">
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-primary">Update</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Analysis Interface -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Bird Analysis</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <input type="text" class="form-control" id="queryInput" 
                           placeholder="Ask about birds (e.g., 'What migration patterns are visible?')">
                </div>
                <button class="btn btn-primary" onclick="analyzeData()">Analyze</button>
                <div id="analysisResult" class="mt-3"></div>
            </div>
        </div>

        <!-- Map Display -->
        <div class="card">
            <div class="card-header">
                <h5>Observation Map</h5>
            </div>
            <div class="card-body">
                <div id="map" class="map-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Add JavaScript for form handling and API calls
        document.getElementById('locationForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('locationName').value,
                latitude: document.getElementById('latitude').value,
                longitude: document.getElementById('longitude').value,
                radius: document.getElementById('radius').value
            };
            
            try {
                const response = await fetch('/api/update-location', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert('Location updated successfully!');
                }
            } catch (error) {
                alert('Error updating location: ' + error);
            }
        };

        async function analyzeData() {
            const query = document.getElementById('queryInput').value;
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('analysisResult').innerHTML = 
                        `<pre class="mt-3">${result.analysis}</pre>`;
                }
            } catch (error) {
                alert('Error analyzing data: ' + error);
            }
        }
    </script>
</body>
</html>
