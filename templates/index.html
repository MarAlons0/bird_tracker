<!DOCTYPE html>
<html>
<head>
    <title>Bird Tracker Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .map-container {
            height: 400px;
            margin: 20px 0;
        }
        #locationForm .form-control {
            margin-bottom: 10px;
        }
        .location-feedback {
            color: #28a745;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Bird Tracker</h1>
        
        <!-- Location Settings -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Location Settings</h5>
            </div>
            <div class="card-body">
                <form id="locationForm">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <input type="text" class="form-control" id="locationSearch" 
                                   placeholder="Search for a location">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="locationName" 
                                   placeholder="Location Name" readonly>
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.0001" class="form-control" 
                                   id="latitude" placeholder="Latitude" readonly>
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.0001" class="form-control" 
                                   id="longitude" placeholder="Longitude" readonly>
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" id="radius" 
                                   placeholder="Radius (km)" value="25">
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-primary">Update</button>
                        </div>
                    </div>
                    <div class="location-feedback" id="locationFeedback">
                        Location updated successfully!
                    </div>
                </form>
            </div>
        </div>

        <!-- Analysis Interface -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Bird Analysis</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <input type="text" class="form-control" id="queryInput" 
                           placeholder="Ask about birds (e.g., 'What migration patterns are visible?')">
                </div>
                <button class="btn btn-primary" onclick="analyzeData()">Analyze</button>
                <div id="analysisResult" class="mt-3"></div>
            </div>
        </div>

        <!-- Map Display -->
        <div class="card">
            <div class="card-header">
                <h5>Observation Map</h5>
            </div>
            <div class="card-body">
                <div id="map" class="map-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Add this at the start of your JavaScript
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo);
            return false;
        };

        // Update the gm_authFailure function
        function gm_authFailure() {
            console.error('Google Maps API authentication failed');
            alert('Error loading Google Maps. Please check the console for details.');
        }

        // Update initAutocomplete to handle errors
        function initAutocomplete() {
            if (!google || !google.maps || !google.maps.places) {
                console.error('Google Maps APIs not loaded correctly');
                return;
            }

            const input = document.getElementById('locationSearch');
            const options = {
                types: ['(cities)', 'establishment', 'natural_feature', 'park'],
                fields: ['name', 'geometry', 'formatted_address']
            };
            
            try {
                const autocomplete = new google.maps.places.Autocomplete(input, options);
                
                autocomplete.addListener('place_changed', function() {
                    const place = autocomplete.getPlace();
                    
                    if (!place.geometry) {
                        alert('No location details available for this place');
                        return;
                    }
                    
                    document.getElementById('locationName').value = 
                        `${place.name} (${place.formatted_address})`;
                    document.getElementById('latitude').value = 
                        place.geometry.location.lat();
                    document.getElementById('longitude').value = 
                        place.geometry.location.lng();
                });
            } catch (error) {
                console.error('Error initializing Places Autocomplete:', error);
            }
        }

        // Form submission handler
        document.getElementById('locationForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('locationName').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                radius: parseFloat(document.getElementById('radius').value)
            };
            
            try {
                const response = await fetch('/api/update-location', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    const feedback = document.getElementById('locationFeedback');
                    feedback.style.display = 'block';
                    setTimeout(() => {
                        feedback.style.display = 'none';
                    }, 3000);
                } else {
                    alert('Error updating location: ' + result.message);
                }
            } catch (error) {
                alert('Error updating location: ' + error);
            }
        };

        async function analyzeData() {
            const query = document.getElementById('queryInput').value;
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('analysisResult').innerHTML = 
                        `<pre class="mt-3">${result.analysis}</pre>`;
                }
            } catch (error) {
                alert('Error analyzing data: ' + error);
            }
        }
    </script>
    
    <!-- Load Google Maps API last -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initAutocomplete">
    </script>
</body>
</html>
